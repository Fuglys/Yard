  <div class="modal" id="loginModal"><div class="modal-content"><div class="modal-header"><h2>Inloggen (Admin)</h2><div class="close-btn" onclick="closeLogin()">×</div></div><input class="login-input" id="loginUser" placeholder="Gebruikersnaam"><input class="login-input" id="loginPass" type="password" placeholder="Wachtwoord"><button class="login-btn" onclick="doLogin()">Inloggen</button><div class="login-error" id="loginError"></div></div></div>
  <div class="toast" id="toast"></div>

  <script>
    const CW = 59, CH = 31; // cell width/height including gap
    const GCOLS = 125, GROWS = 100;
    const STORAGE_KEY = 'yard_layout_v2';
    const ZAK_DATA_KEY = 'yard_zak_data';
    const QUEUE_KEY = 'yard_sync_queue';
    const SYNC_INTERVAL = 5000;
    const TL_SEL_KEY = 'yard_tl_selections';

    // Layout: sparse map of "col,row" -> { cellType, label, meta }
    // cellType: wall, container-type, afval-type, bunker-type, zak-num, zak, custom-XXX
    let layout = {}; // "col,row" -> { cellType, label, meta }
    let zakData = {}; // "row-layer" -> { type, cssClass, blocked, updated_at }
    let cellElements = {}; // "col,row" -> DOM element

    let selectedCells = [], syncInProgress = false, materials = [], allMaterialsIncTest = [], allMaterialNames = [];
    let isMoving = false, movingCells = [], moveTargetRow = null, adminMode = false;
    let scale = 1, panX = 0, panY = 0, isDragging = false, dragMoved = false, dragStartX, dragStartY, startPanX, startPanY;
    let lastTouchDist = 0, twoFingerStartX = 0, twoFingerStartY = 0;
    let isSelecting = false, selectStartCell = null;
    const MIN_SCALE = 0.1, MAX_SCALE = 5;

    // ── Default layout: zakken ──
    function getDefaultLayout() {
      const L = {};
      function set(c, r, type, label, meta) { L[`${c},${r}`] = { cellType: type, label: label || '', meta: meta || {} }; }
      // Top section: rij 120..66 — numbers at row 0 and row 14, zak cells rows 1-13
      // Rightmost zak (rij 66) at col 119 (5 from right edge of 125), rij 120 at col 65
      for (let rij = 120; rij >= 66; rij--) {
        const col = 119 - (rij - 66);
        set(col, 0, 'zak-num', String(rij), { rij });
        set(col, 14, 'zak-num', String(rij), { rij });
        for (let l = 1; l <= 13; l++) set(col, l, 'zak', '', { rij, layer: l });
      }
      // Bottom section: E1,E2,E3 + rij 55..1 — starts at row 17
      const botY = 17;
      // Rij 1 at col 119, rij 55 at col 65, E cols at 62,63,64
      for (let i = 0; i < 3; i++) {
        set(62 + i, botY, 'zak-num', '', { rij: 'E' + (i + 1) });
        set(62 + i, botY + 14, 'zak-num', '', { rij: 'E' + (i + 1) });
        for (let l = 1; l <= 13; l++) set(62 + i, botY + l, 'zak', '', { rij: 'E' + (i + 1), layer: l });
      }
      // Gap col 64->65
      // Rij 55 at col 65, rij 1 at col 119
      for (let rij = 55; rij >= 1; rij--) {
        const col = 65 + (55 - rij);
        set(col, botY, 'zak-num', String(rij), { rij });
        set(col, botY + 14, 'zak-num', String(rij), { rij });
        for (let l = 1; l <= 13; l++) set(col, botY + l, 'zak', '', { rij, layer: l });
      }
      return L;
    }

    // ── Render ──
    function renderGrid() {
      const container = document.getElementById('gridContainer');
      container.innerHTML = '';
      cellElements = {};

      if (adminMode) {
        // Only render around existing layout + padding, not full 100x100
        const minC = 0, maxC = GCOLS - 1;
        const minR = 0, maxR = GROWS - 1;

        // Column numbers
        for (let c = minC; c <= maxC; c++) {
          const el = document.createElement('div');
          el.className = 'gc grid-num';
          el.style.left = ((c + 1) * CW) + 'px';
          el.style.top = (minR * CH) + 'px';
          el.textContent = c + 1;
          container.appendChild(el);
        }
        // Row numbers
        for (let r = minR; r <= maxR; r++) {
          const el = document.createElement('div');
          el.className = 'gc grid-num';
          el.style.left = (minC * CW) + 'px';
          el.style.top = ((r + 1) * CH) + 'px';
          el.textContent = r + 1;
          container.appendChild(el);
        }
        // Cells
        for (let r = minR; r <= maxR; r++) {
          for (let c = minC; c <= maxC; c++) {
            const key = `${c},${r}`;
            const def = layout[key];
            if (def) {
              createCellElement(container, c, r, def, true);
            } else {
              const el = document.createElement('div');
              el.className = 'gc edit-empty';
              el.style.left = ((c + 1) * CW) + 'px';
              el.style.top = ((r + 1) * CH) + 'px';
              el.dataset.col = c;
              el.dataset.row = r;
              container.appendChild(el);
              cellElements[key] = el;
            }
          }
        }
      } else {
        // Normal mode: merge adjacent cells of same type+content
        // All non-editable types merge in all directions
        // Zak cells with same material merge vertically only
        // Bunker cells with same material merge in all directions
        // Custom types merge in all directions
        const merged = new Set();
        const zakData = getZakData();

        // Build merge groups: key = type identifier, value = set of grid keys
        const mergeGroups = {};
        for (const [key, def] of Object.entries(layout)) {
          const [c, r] = key.split(',').map(Number);
          let groupId = null;
          let label = '';
          let verticalOnly = false;

          if (def.cellType === 'container-type' || def.cellType === 'afval-type') {
            groupId = def.cellType;
            label = def.label || (def.cellType === 'container-type' ? 'Container' : 'Afval');
          } else if (def.cellType && def.cellType.startsWith('custom-')) {
            groupId = def.cellType + '|' + (def.label || '');
            label = def.label || '';
          } else if (def.cellType === 'zak') {
            // Check if this zak has material
            const rij = def.meta?.rij; const layer = def.meta?.layer;
            if (rij && layer) {
              const zd = zakData[`${rij}-${layer}`];
              if (zd && zd.type && zd.type !== 'Empty') {
                groupId = 'zak-mat|' + zd.type;
                label = zd.type;
                verticalOnly = true;
              }
            }
          } else if (def.cellType === 'bunker-filled') {
            groupId = 'bunker|' + (def.label || '');
            label = def.label || '';
          }

          if (groupId) {
            if (!mergeGroups[groupId]) mergeGroups[groupId] = { cells: [], label, verticalOnly, cellType: def.cellType, color: def.meta?.color || '' };
            mergeGroups[groupId].cells.push({ c, r, key });
          }
        }

        // Find merged regions for each group
        const regions = [];
        for (const group of Object.values(mergeGroups)) {
          if (group.cells.length < 2) continue;
          const cellSet = new Set(group.cells.map(c => c.key));
          const groupVisited = new Set();

          for (const cell of group.cells) {
            if (groupVisited.has(cell.key)) continue;

            // BFS to find connected component
            const component = new Set();
            const queue = [cell.key];
            while (queue.length > 0) {
              const cur = queue.shift();
              if (component.has(cur) || !cellSet.has(cur) || groupVisited.has(cur)) continue;
              component.add(cur);
              const [cc, cr] = cur.split(',').map(Number);
              if (group.verticalOnly) {
                // Only vertical neighbors
                [`${cc},${cr-1}`, `${cc},${cr+1}`].forEach(nk => { if (cellSet.has(nk) && !component.has(nk)) queue.push(nk); });
              } else {
                [[cc-1,cr],[cc+1,cr],[cc,cr-1],[cc,cr+1]].forEach(([nc,nr]) => { const nk = `${nc},${nr}`; if (cellSet.has(nk) && !component.has(nk)) queue.push(nk); });
              }
            }

            if (component.size < 2) { groupVisited.add(cell.key); continue; }

            // Find bounding box
            let minC=999,maxC=-1,minR=999,maxR=-1;
            for (const k of component) { const [c,r]=k.split(',').map(Number); if(c<minC)minC=c;if(c>maxC)maxC=c;if(r<minR)minR=r;if(r>maxR)maxR=r; }

            // Check if perfect rectangle
            let perfect = true;
            for (let r=minR;r<=maxR&&perfect;r++) for (let c=minC;c<=maxC;c++) if (!component.has(`${c},${r}`)) { perfect=false; break; }

            const keys = [...component];
            keys.forEach(k => { groupVisited.add(k); merged.add(k); });
            regions.push({ cellType: group.cellType, minC, maxC, minR, maxR, keys, label: group.label, color: group.color });
          }
        }

        // Render merged regions as colored cells with borders only on edges
        const regionMap = {}; // key -> region index
        regions.forEach((region, idx) => {
          region.keySet = new Set(region.keys);
          region.keys.forEach(k => regionMap[k] = idx);
        });

        function hashColor(str) {
          // Generate a pleasant, muted color from a string
          let hash = 0;
          for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
          const h = Math.abs(hash) % 360;
          return `hsl(${h}, 55%, 55%)`;
        }
        function darken(hslStr, amount) {
          const m = hslStr.match(/hsl\((\d+),\s*(\d+)%,\s*(\d+)%\)/);
          if (!m) return '#333';
          return `hsl(${m[1]}, ${m[2]}%, ${Math.max(0, parseInt(m[3]) - amount)}%)`;
        }

        function getRegionStyle(region) {
          const ct = region.cellType;
          const colors = { S01:'#a8c8e0', S02:'#6a9bbd', S17:'#3d6f8e', T01:'#dba8a8', T02:'#b06868', T17:'#7a3c3c', DVRMI050:'#d4b896', DVRNA050:'#96c8aa', LUMPS:'#9cc0d4', Quarantine:'#a888b5' };
          if (ct === 'container-type') return { bg:'#7f8c8d', border:'#566573', fg:'#fff' };
          if (ct === 'afval-type') return { bg:'#95a5a6', border:'#7f8c8d', fg:'#fff' };
          if (ct === 'bunker-filled') {
            return { bg: '#e67e22', border: '#8b4513', fg: '#fff' };
          }
          if (ct === 'zak') { const css = cssFromType(region.label); return { bg: colors[css] || '#5dade2', border:'rgba(0,0,0,0.2)', fg:'#fff' }; }
          if (region.color) return { bg: region.color, border: region.color, fg:'#fff' };
          return { bg:'#bdc3c7', border:'#95a5a6', fg:'#333' };
        }

        // Render all cells — merged ones get colored + selective borders
        for (const [key, def] of Object.entries(layout)) {
          const [c, r] = key.split(',').map(Number);
          const el = createCellElement(container, c, r, def, false);

          if (merged.has(key)) {
            const rIdx = regionMap[key];
            const region = regions[rIdx];
            const style = getRegionStyle(region);
            const ks = region.keySet;

            el.style.background = style.bg;
            el.style.color = 'transparent';
            el.style.zIndex = '2';
            el.innerHTML = '';
            el.style.borderTop = ks.has(`${c},${r-1}`) ? 'none' : `3px solid ${style.border}`;
            el.style.borderBottom = ks.has(`${c},${r+1}`) ? 'none' : `3px solid ${style.border}`;
            el.style.borderLeft = ks.has(`${c-1},${r}`) ? 'none' : `3px solid ${style.border}`;
            el.style.borderRight = ks.has(`${c+1},${r}`) ? 'none' : `3px solid ${style.border}`;
            el.style.borderRadius = '0';
          }
        }

        // Add label overlay in center of each region
        regions.forEach(region => {
          if (!region.label) return;

          // Calculate centroid of actual cells (not bounding box)
          let sumC = 0, sumR = 0;
          region.keys.forEach(k => { const [c,r] = k.split(',').map(Number); sumC += c; sumR += r; });
          const centC = sumC / region.keys.length;
          const centR = sumR / region.keys.length;

          // Size based on number of cells
          const cellCount = region.keys.length;
          const fontSize = cellCount > 20 ? 14 : cellCount > 8 ? 12 : cellCount > 3 ? 10 : 7;

          const el = document.createElement('div');
          el.className = 'merged-label';
          el.style.position = 'absolute';
          // Position at centroid, centered
          el.style.left = (centC * CW + CW/2) + 'px';
          el.style.top = (centR * CH + CH/2) + 'px';
          el.style.transform = 'translate(-50%, -50%)';
          el.style.pointerEvents = 'none';
          el.style.zIndex = '4';
          el.style.fontSize = fontSize + 'px';
          el.style.fontWeight = '800';
          el.style.color = '#fff';
          el.style.textShadow = '0 1px 4px rgba(0,0,0,0.4), 0 0 8px rgba(0,0,0,0.2)';
          el.style.textAlign = 'center';
          el.style.letterSpacing = '0.3px';
          el.style.whiteSpace = 'nowrap';
          el.style.maxWidth = ((region.maxC - region.minC + 1) * CW) + 'px';
          el.style.overflow = 'hidden';
          el.style.textOverflow = 'ellipsis';

          const parts = (region.label || '').split(' ');
          if (parts.length >= 2 && region.cellType === 'zak') {
            el.innerHTML = `<div>${parts[0]}<br><span style="font-size:${Math.max(7, fontSize-2)}px;opacity:0.9">${parts.slice(1).join(' ')}</span></div>`;
          } else {
            el.textContent = region.label;
          }
          container.appendChild(el);
        });
      }
      loadZakDataToGrid();
    }

    // Greedy rectangle merge for non-editable types
    function findMergedRegions(layout, mergeableTypes) {
      const regions = [];
      const visited = new Set();

      // Build lookup: type+label -> set of "c,r"
      const groups = {};
      for (const [key, def] of Object.entries(layout)) {
        if (!mergeableTypes.has(def.cellType)) continue;
        const groupKey = def.cellType + '|' + (def.label || '');
        if (!groups[groupKey]) groups[groupKey] = { cellType: def.cellType, label: def.label || '', color: def.meta?.color || '', cells: new Set() };
        groups[groupKey].cells.add(key);
      }

      for (const group of Object.values(groups)) {
        const cellSet = group.cells;

        // Flood-fill to find connected components
        const remaining = new Set(cellSet);
        while (remaining.size > 0) {
          const start = remaining.values().next().value;
          const [sc, sr] = start.split(',').map(Number);

          // BFS to find all connected cells of same type+label
          const component = new Set();
          const queue = [start];
          while (queue.length > 0) {
            const cur = queue.shift();
            if (component.has(cur) || !remaining.has(cur)) continue;
            component.add(cur);
            remaining.delete(cur);
            const [cc, cr] = cur.split(',').map(Number);
            [[cc-1,cr],[cc+1,cr],[cc,cr-1],[cc,cr+1]].forEach(([nc,nr]) => {
              const nk = `${nc},${nr}`;
              if (remaining.has(nk) && !component.has(nk)) queue.push(nk);
            });
          }

          // Find bounding box of this component
          let minC=999,maxC=-1,minR=999,maxR=-1;
          const keys = [...component];
          keys.forEach(k => {
            const [c,r] = k.split(',').map(Number);
            if(c<minC)minC=c;if(c>maxC)maxC=c;if(r<minR)minR=r;if(r>maxR)maxR=r;
          });

          // Check if bounding box is fully filled (perfect rectangle)
          let isPerfectRect = true;
          for (let r=minR;r<=maxR&&isPerfectRect;r++) {
            for (let c=minC;c<=maxC;c++) {
              if (!component.has(`${c},${r}`)) { isPerfectRect = false; break; }
            }
          }

          if (isPerfectRect && keys.length > 1) {
            keys.forEach(k => visited.add(k));
            regions.push({ cellType: group.cellType, minC, maxC, minR, maxR, keys, label: group.label, color: group.color });
          } else {
            // Not a perfect rectangle — try to split into maximal rectangles
            const subVisited = new Set();
            const sorted = keys.map(k => k.split(',').map(Number)).sort((a,b) => a[1]-b[1] || a[0]-b[0]);
            for (const [c,r] of sorted) {
              const k = `${c},${r}`;
              if (subVisited.has(k)) continue;
              // Expand right
              let mc = c;
              while (component.has(`${mc+1},${r}`) && !subVisited.has(`${mc+1},${r}`)) mc++;
              // Expand down
              let mr = r;
              let canDown = true;
              while (canDown) {
                for (let cc=c;cc<=mc;cc++) {
                  if (!component.has(`${cc},${mr+1}`) || subVisited.has(`${cc},${mr+1}`)) { canDown=false; break; }
                }
                if (canDown) mr++;
              }
              const subKeys = [];
              for (let rr=r;rr<=mr;rr++) for (let cc=c;cc<=mc;cc++) { subKeys.push(`${cc},${rr}`); subVisited.add(`${cc},${rr}`); visited.add(`${cc},${rr}`); }
              if (subKeys.length > 1) {
                regions.push({ cellType: group.cellType, minC:c, maxC:mc, minR:r, maxR:mr, keys:subKeys, label: group.label, color: group.color });
              } else {
                visited.add(k);
                regions.push({ cellType: group.cellType, minC:c, maxC:c, minR:r, maxR:r, keys:[k], label: group.label, color: group.color });
              }
            }
          }
        }
      }
      return regions;
    }

    function createCellElement(container, col, row, def, editMode) {
      const key = `${col},${row}`;
      const el = document.createElement('div');
      const offsetX = editMode ? (col + 1) * CW : col * CW;
      const offsetY = editMode ? (row + 1) * CH : row * CH;
      el.style.left = offsetX + 'px';
      el.style.top = offsetY + 'px';
      el.dataset.col = col;
      el.dataset.row = row;
      el.dataset.celltype = def.cellType;

      if (def.meta && def.meta.rij !== undefined) {
        el.dataset.rij = String(def.meta.rij);
        if (def.meta.layer !== undefined) el.dataset.layer = String(def.meta.layer);
      }
      // Ensure zak cells always have rij/layer from nearby zak-num
      if (def.cellType === 'zak' && !el.dataset.rij) {
        // Search UP first to find the zak-num header
        for (let searchR = row - 1; searchR >= Math.max(0, row - 20); searchR--) {
          const nk = `${col},${searchR}`;
          const nd = layout[nk];
          if (nd && nd.cellType === 'zak-num') {
            const rij = nd.meta?.rij || nd.label;
            if (rij) {
              el.dataset.rij = String(rij);
              el.dataset.layer = String(row - searchR);
              break;
            }
          }
        }
        // If not found above, search DOWN
        if (!el.dataset.rij) {
          for (let searchR = row + 1; searchR <= Math.min(99, row + 20); searchR++) {
            const nk = `${col},${searchR}`;
            const nd = layout[nk];
            if (nd && nd.cellType === 'zak-num') {
              const rij = nd.meta?.rij || nd.label;
              if (rij) {
                el.dataset.rij = String(rij);
                el.dataset.layer = String(searchR - row);
                break;
              }
            }
          }
        }
      }

    function getLayoutBounds() {
      let minC = 999, maxC = -1, minR = 999, maxR = -1;
      for (const key of Object.keys(layout)) {
        const [c, r] = key.split(',').map(Number);
        if (c < minC) minC = c; if (c > maxC) maxC = c;
        if (r < minR) minR = r; if (r > maxR) maxR = r;
      }
      if (maxC === -1) { minC = 0; maxC = 20; minR = 0; maxR = 20; }
      return { minC, maxC, minR, maxR };
    }

    // ── Cell interaction ──
    function getCellAt(x, y) {
      const el = document.elementFromPoint(x, y);
      const check = (e) => {
        if (!e || !e.classList.contains('gc')) return null;
        if (adminMode) return e; // In edit mode, all cells are clickable
        if (e.classList.contains('wall') || e.classList.contains('container-type') || e.classList.contains('afval-type')) return null;
        if (e.dataset.celltype === 'zak-num') return null;
        const key = `${e.dataset.col},${e.dataset.row}`;
        const def = layout[key];
        if (def && def.meta && def.meta.editable === false) return null;
        return e;
      };
      if (el && el.classList.contains('gc')) return check(el);
      if (el && el.parentElement && el.parentElement.classList.contains('gc')) return check(el.parentElement);
      return null;
    }
    function clearSelection() { selectedCells.forEach(c => c.classList.remove('selected')); selectedCells = []; }
    function clearMoveTargets() { document.querySelectorAll('.gc.move-target').forEach(c => c.classList.remove('move-target')); }

    function updateSelection(sc, ec) {
      clearSelection();
      if (!sc || !ec) return;
      const c1 = parseInt(sc.dataset.col), r1 = parseInt(sc.dataset.row);
      const c2 = parseInt(ec.dataset.col), r2 = parseInt(ec.dataset.row);

      // Zak cells: vertical only (same col)
      if (sc.dataset.celltype === 'zak' && ec.dataset.celltype === 'zak' && sc.dataset.rij === ec.dataset.rij) {
        for (let r = Math.min(r1, r2); r <= Math.max(r1, r2); r++) {
          const el = cellElements[`${c1},${r}`];
          if (el && el.dataset.celltype === 'zak') { el.classList.add('selected'); selectedCells.push(el); }
        }
        return;
      }

      // General: rectangle
      for (let r = Math.min(r1, r2); r <= Math.max(r1, r2); r++) {
        for (let c = Math.min(c1, c2); c <= Math.max(c1, c2); c++) {
          const el = cellElements[`${c},${r}`];
          if (el && (!adminMode ? !el.classList.contains('wall') : true)) {

    }

    // ── Pan/Zoom ──
    function applyTransform() { document.getElementById('yardWorld').style.transform = `translate(${panX}px,${panY}px) scale(${scale})`; }
    function zoomIn() { scale = Math.min(MAX_SCALE, scale * 1.3); applyTransform(); }
    function zoomOut() { scale = Math.max(MIN_SCALE, scale / 1.3); applyTransform(); }
    function onMouseDown(e) {
      if (e.target.closest('.modal,.header,.edit-panel')) return;
      if (isMoving) { const c = getCellAt(e.clientX, e.clientY); if (c && c.dataset.rij) { moveTargetRow = c.dataset.rij; if (confirm(`Verplaatsen naar rij ${moveTargetRow}?`)) executeMove(); } endMoveMode(); e.preventDefault(); return; }
      const cell = getCellAt(e.clientX, e.clientY);

    }
    function onMouseMove(e) {

      if (isMoving) { const c = getCellAt(e.clientX, e.clientY); if (c) highlightMoveTarget(c); return; }
      if (adminMode && paintTool && isSelecting && selectStartCell) {
        const c = getCellAt(e.clientX, e.clientY);
        if (c) updateSelection(selectStartCell, c);
        return;
      }
      if (isSelecting && selectStartCell) { const c = getCellAt(e.clientX, e.clientY); if (c) updateSelection(selectStartCell, c); return; }
      if (!isDragging) return; const dx = e.clientX - dragStartX, dy = e.clientY - dragStartY; if (Math.abs(dx) > 3 || Math.abs(dy) > 3) dragMoved = true; panX = startPanX + dx; panY = startPanY + dy; applyTransform();
    }
    function onMouseUp() {
      if (isMoving) return;
      if (adminMode && paintTool && isSelecting && selectedCells.length > 0) {
        isSelecting = false;

        return;
      }
      if (isSelecting) { isSelecting = false; if (selectedCells.length > 0) openModalMulti(); return; }
      isDragging = false;
    }
    function onWheel(e) { if (e.target.closest('.modal,.header')) return; e.preventDefault(); const f = e.deltaY < 0 ? 1.12 : 0.88, ns = Math.min(MAX_SCALE, Math.max(MIN_SCALE, scale * f)); const rect = document.getElementById('viewport').getBoundingClientRect(); const cx = e.clientX - rect.left, cy = e.clientY - rect.top; panX = cx - (cx - panX) * (ns / scale); panY = cy - (cy - panY) * (ns / scale); scale = ns; applyTransform(); }
    function dist2(t) { const dx = t[0].clientX - t[1].clientX, dy = t[0].clientY - t[1].clientY; return Math.sqrt(dx * dx + dy * dy); }
    function onTouchStart(e) { if (e.target.closest('.modal,.header,.edit-panel')) return; if (isMoving && e.touches.length === 1) { const c = getCellAt(e.touches[0].clientX, e.touches[0].clientY); if (c && c.dataset.rij) { moveTargetRow = c.dataset.rij; if (confirm(`Verplaatsen naar rij ${moveTargetRow}?`)) executeMove(); } endMoveMode(); e.preventDefault(); return; } if (e.touches.length === 1) { const c = getCellAt(e.touches[0].clientX, e.touches[0].clientY); if (c) { isSelecting = true; selectStartCell = c; clearSelection(); c.classList.add('selected'); selectedCells = [c]; e.preventDefault(); return; } isDragging = true; dragMoved = false; dragStartX = e.touches[0].clientX; dragStartY = e.touches[0].clientY; startPanX = panX; startPanY = panY; } else if (e.touches.length === 2) { isSelecting = false; isDragging = false; lastTouchDist = dist2(e.touches); twoFingerStartX = (e.touches[0].clientX + e.touches[1].clientX) / 2; twoFingerStartY = (e.touches[0].clientY + e.touches[1].clientY) / 2; } }
    function onTouchMove(e) { if (e.target.closest('.modal,.header,.edit-panel')) return; e.preventDefault(); if (isMoving && e.touches.length === 1) { const c = getCellAt(e.touches[0].clientX, e.touches[0].clientY); if (c) highlightMoveTarget(c); return; } if (e.touches.length === 1 && isSelecting && selectStartCell) { const c = getCellAt(e.touches[0].clientX, e.touches[0].clientY); if (c) updateSelection(selectStartCell, c); return; } if (e.touches.length === 1 && isDragging) { const dx = e.touches[0].clientX - dragStartX, dy = e.touches[0].clientY - dragStartY; if (Math.abs(dx) > 3 || Math.abs(dy) > 3) dragMoved = true; panX = startPanX + dx; panY = startPanY + dy; applyTransform(); } else if (e.touches.length === 2) { const d = dist2(e.touches), cx = (e.touches[0].clientX + e.touches[1].clientX) / 2, cy = (e.touches[0].clientY + e.touches[1].clientY) / 2; const f = d / lastTouchDist, ns = Math.min(MAX_SCALE, Math.max(MIN_SCALE, scale * f)); const rect = document.getElementById('viewport').getBoundingClientRect(); const rx = cx - rect.left, ry = cy - rect.top; panX = rx - (rx - panX) * (ns / scale); panY = ry - (ry - panY) * (ns / scale); scale = ns; lastTouchDist = d; panX += cx - twoFingerStartX; panY += cy - twoFingerStartY; twoFingerStartX = cx; twoFingerStartY = cy; applyTransform(); } }

    // ── Move ──
    function startMoveMode() { const zd = getZakData(); movingCells = selectedCells.filter(c => c.dataset.rij && c.dataset.layer).map(c => { const k = `${c.dataset.rij}-${c.dataset.layer}`; return { layer: parseInt(c.dataset.layer), rij: c.dataset.rij, data: zd[k] || null, cell: c }; }).filter(m => m.data && m.data.type !== 'Empty'); if (!movingCells.length) { showToast('Geen gevulde vakken'); return; } isMoving = true; movingCells.forEach(m => m.cell.classList.add('moving')); clearSelection(); showToast('Tik op doelrij...'); }
    function highlightMoveTarget(tc) { clearMoveTargets(); if (!tc || !tc.dataset.rij) return; moveTargetRow = tc.dataset.rij; movingCells.forEach(m => { const t = document.querySelector(`.gc[data-rij="${moveTargetRow}"][data-layer="${m.layer}"]`); if (t) t.classList.add('move-target'); }); }
    function executeMove() { if (!moveTargetRow || !movingCells.length) return; const src = movingCells[0].rij; if (src === moveTargetRow) { showToast('Zelfde rij'); return; } const zd = getZakData(), queue = getQueue(), ts = Date.now(); if (!movingCells.every(m => { const d = zd[`${moveTargetRow}-${m.layer}`]; return !d || d.type === 'Empty'; })) { showToast('Niet leeg!'); return; } movingCells.forEach(m => { const sk = `${src}-${m.layer}`, dk = `${moveTargetRow}-${m.layer}`; zd[sk] = { type: 'Empty', cssClass: 'Empty', updated_at: ts }; const sc = document.querySelector(`.gc[data-rij="${src}"][data-layer="${m.layer}"]`); if (sc) applyZakVisual(sc, 'Empty', ''); let i = queue.findIndex(c => c.row_num == src && c.layer === m.layer); if (i !== -1) queue.splice(i, 1); queue.push({ row_num: src, layer: m.layer, type: 'Empty', updated_at: ts }); zd[dk] = { ...m.data, updated_at: ts }; const tc = document.querySelector(`.gc[data-rij="${moveTargetRow}"][data-layer="${m.layer}"]`); if (tc) applyZakVisual(tc, m.data.cssClass, m.data.type); i = queue.findIndex(c => c.row_num == moveTargetRow && c.layer === m.layer); if (i !== -1) queue.splice(i, 1); queue.push({ row_num: moveTargetRow, layer: m.layer, type: m.data.type, updated_at: ts }); }); saveZakData(zd); saveQueue(queue); showToast(`${movingCells.length} verplaatst`); }
    function endMoveMode() { movingCells.forEach(m => m.cell.classList.remove('moving')); clearMoveTargets(); clearSelection(); isMoving = false; movingCells = []; moveTargetRow = null; }

    // ── Zak visual ──
    function applyZakVisual(cell, cssClass, label) {
      const base = 'gc zak';
      if (!cssClass || cssClass === 'Empty' || !label) { cell.className = base; cell.innerHTML = ''; cell.title = ''; return; }
      cell.className = `${base} ${cssClass}`; cell.title = label || '';
      const parts = (label || '').split(' ');
      if (parts.length >= 2) cell.innerHTML = `<span>${cssClass}</span><span style="font-size:4px;opacity:0.85">${parts.slice(1).join(' ')}</span>`;
      else cell.innerHTML = `<span>${label}</span>`;
    }
    function cssFromType(t) { if (!t || t === 'Empty') return 'Empty'; if (t.startsWith('S01') || t.startsWith('TL1')) return 'S01'; if (t.startsWith('S02')) return 'S02'; if (t.startsWith('S17')) return 'S17'; if (t.startsWith('T01') || t.startsWith('TL2')) return 'T01'; if (t.startsWith('T02')) return 'T02'; if (t.startsWith('T17')) return 'T17'; if (t.startsWith('DVRMI050')) return 'DVRMI050'; if (t.startsWith('DVRNA050')) return 'DVRNA050'; if (t === 'Pellets') return 'Pellets'; if (t === 'LUMPS') return 'LUMPS'; if (t.startsWith('Q') || t === 'Quarantine') return 'Quarantine'; return 'S01'; }

    // ── Paint tool (edit mode) ──
    let paintTool = null;
    let numCounter = 0;
    let undoStack = [];
    let redoStack = [];
    const MAX_UNDO = 50;

    function pushUndo() {
      undoStack.push(JSON.stringify(layout));
      if (undoStack.length > MAX_UNDO) undoStack.shift();
      redoStack = [];
    }
    function undo() {
      if (!undoStack.length) { showToast('Niets om ongedaan te maken'); return; }
      redoStack.push(JSON.stringify(layout));
      layout = JSON.parse(undoStack.pop());
      saveLayout(); renderGrid(); showToast('Ongedaan gemaakt');
    }
    function redo() {
      if (!redoStack.length) { showToast('Niets om opnieuw te doen'); return; }
      undoStack.push(JSON.stringify(layout));
      layout = JSON.parse(redoStack.pop());
      saveLayout(); renderGrid(); showToast('Opnieuw gedaan');
    }

    function setPaintTool(cellType, label) {
      // Deactivate all buttons
      document.querySelectorAll('.ep-btn').forEach(b => b.classList.remove('active'));
      if (paintTool && paintTool.cellType === cellType) {
        paintTool = null;
        document.getElementById('epActive').textContent = 'Geen tool';
        return;
      }
      const editable = ['bunker-type','zak'].includes(cellType);
      paintTool = { cellType, label, editable, color: '' };
      if (cellType === 'zak-num') {
        numCounter = parseInt(document.getElementById('numFrom').value) || 1;
        paintTool.numTo = parseInt(document.getElementById('numTo').value) || 999;
      }
      // Highlight active button
      event.target.classList.add('active');
      const names = { wall:'Muur', 'container-type':'Container', 'afval-type':'Afval', 'bunker-type':'Balen', zak:'Zak', 'zak-num':'Nummering', eraser:'Wissen' };
      document.getElementById('epActive').textContent = '✓ ' + (names[cellType] || cellType);
    }

    function setCustomPaintTool(cls, name, color, editable) {
      document.querySelectorAll('.ep-btn').forEach(b => b.classList.remove('active'));
      paintTool = { cellType: cls, label: name, editable, color };
      document.getElementById('epActive').textContent = '✓ ' + name;
    }

    function addCustomType() {
      const name = document.getElementById('epCustomName').value.trim();
      if (!name) { showToast('Vul een naam in'); return; }
      const cls = 'custom-' + name.toLowerCase().replace(/[^a-z0-9]/g, '');
      const color = document.getElementById('epCustomColor').value;
      const editable = document.getElementById('epCustomEdit').checked;
      const customTypes = JSON.parse(localStorage.getItem('yard_custom_types') || '[]');
      if (!customTypes.find(t => t.cls === cls)) {
        customTypes.push({ cls, name, color, editable });
        localStorage.setItem('yard_custom_types', JSON.stringify(customTypes));
      }
      injectCustomCSS(cls, color);
      loadCustomTypesPanel();
      setCustomPaintTool(cls, name, color, editable);
      document.getElementById('epCustomName').value = '';
    }

    function loadCustomTypesPanel() {
      const list = document.getElementById('epCustomList');
      if (!list) return;
      list.innerHTML = '';
      const customTypes = JSON.parse(localStorage.getItem('yard_custom_types') || '[]');
      customTypes.forEach(ct => {
        const btn = document.createElement('button');
        btn.className = 'ep-btn';
        btn.style.borderLeft = `4px solid ${ct.color}`;
        btn.textContent = (ct.editable ? '✎ ' : '🔒 ') + ct.name;
        btn.addEventListener('click', () => setCustomPaintTool(ct.cls, ct.name, ct.color, ct.editable));

      });
    }

    function applyPaintToSelection() {
      if (!paintTool || !selectedCells.length) return;
      pushUndo();
      if (paintTool.cellType === 'zak-num') {
        const from = parseInt(document.getElementById('numFrom').value) || 1;
        const to = parseInt(document.getElementById('numTo').value) || 999;
        numCounter = from;
        paintTool.numFrom = from;
        paintTool.numTo = to;
        paintTool.numStep = from <= to ? 1 : -1;
      }
      // Sort cells left-to-right, top-to-bottom for consistent numbering
      const sorted = [...selectedCells].sort((a, b) => {
        const ra = parseInt(a.dataset.row), rb = parseInt(b.dataset.row);
        const ca = parseInt(a.dataset.col), cb = parseInt(b.dataset.col);
        return ra !== rb ? ra - rb : ca - cb;
      });
      sorted.forEach(el => applyPaintToCell(el));
      clearSelection();
      showToast(`${sorted.length} vlakken ingevuld`);
    }

    function applyPaintToCell(el) {
      if (!paintTool || !el) return;
      const key = `${el.dataset.col},${el.dataset.row}`;

      if (paintTool.cellType === 'eraser') {
        delete layout[key];
        el.className = 'gc edit-empty';
        el.textContent = '';
        el.style.cssText = el.style.cssText.replace(/background:[^;]+;?/g,'').replace(/border-color:[^;]+;?/g,'');
        el.dataset.celltype = '';
        saveLayout();
        return;
      }

      let label = paintTool.label;
      if (paintTool.cellType === 'zak-num') {
        const step = paintTool.numStep || 1;
        if (step > 0 && numCounter > paintTool.numTo) return;
        if (step < 0 && numCounter < paintTool.numTo) return;
        label = String(numCounter);
        numCounter += step;
      }

      layout[key] = {
        cellType: paintTool.cellType,
        label: label,
        meta: { editable: paintTool.editable, color: paintTool.color || '', rij: paintTool.cellType === 'zak-num' ? label : undefined }
      };

      // Update visual
      el.dataset.celltype = paintTool.cellType;
      if (paintTool.cellType === 'wall') { el.className = 'gc wall'; el.textContent = ''; }
      else if (paintTool.cellType === 'container-type') { el.className = 'gc container-type'; el.textContent = 'Container'; }
      else if (paintTool.cellType === 'afval-type') { el.className = 'gc afval-type'; el.textContent = 'Afval'; }
      else if (paintTool.cellType === 'bunker-type') { el.className = 'gc bunker-type'; el.textContent = ''; }
      else if (paintTool.cellType === 'zak') { el.className = 'gc zak'; el.textContent = ''; }
      else if (paintTool.cellType === 'zak-num') { el.className = 'gc zak-num'; el.textContent = label; el.dataset.rij = label; }
      else if (paintTool.color) { el.className = 'gc'; el.style.background = paintTool.color; el.style.color = '#fff'; el.style.borderColor = paintTool.color; el.textContent = label; }
      else { el.className = 'gc ' + paintTool.cellType; el.textContent = label; }

      saveLayout();
    }

    // ── Admin ──
    function toggleAdmin() { if (adminMode) { adminMode = false; document.getElementById('adminBtn').classList.remove('active'); document.getElementById('adminBtn').textContent = '🔒'; document.getElementById('saveBtn').style.display = 'none'; document.getElementById('editPanel').classList.remove('open'); paintTool = null; renderGrid(); showToast('Bewerk-modus uit'); return; } document.getElementById('loginError').textContent = ''; document.getElementById('loginUser').value = ''; document.getElementById('loginPass').value = ''; document.getElementById('loginModal').classList.add('active'); }
    function closeLogin() { document.getElementById('loginModal').classList.remove('active'); }
    async function doLogin() { const user = document.getElementById('loginUser').value.trim(), pass = document.getElementById('loginPass').value; if (!user || !pass) { document.getElementById('loginError').textContent = 'Vul beide velden in'; return; } try { const res = await fetch('/api/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: user, password: pass }) }); const data = await res.json(); if (res.ok && data.ok) { adminMode = true; document.getElementById('adminBtn').classList.add('active'); document.getElementById('adminBtn').textContent = '🔓 ' + data.username; document.getElementById('saveBtn').style.display = ''; document.getElementById('editPanel').classList.add('open'); closeLogin(); renderGrid(); loadCustomTypesPanel(); showToast('Bewerk-modus aan'); } else { document.getElementById('loginError').textContent = data.error || 'Mislukt'; } } catch (e) { document.getElementById('loginError').textContent = 'Server niet bereikbaar'; } }

    // ── Modal ──
    function openModalMulti() {
      const count = selectedCells.length; if (!count) return;
      // Prevent double popup
      if (document.getElementById('modal').classList.contains('active')) return;
      
      const first = selectedCells[0];
      const ct = first.dataset.celltype || '';
      const isZak = ct === 'zak';
      const isBunker = ct === 'bunker-type' || ct === 'bunker-filled' || first.classList.contains('bunker-type') || first.classList.contains('bunker-filled');
      const isEditEmpty = first.classList.contains('edit-empty');

      if (adminMode && (isEditEmpty || (!isZak && !isBunker))) {
        document.getElementById('modalTitle').textContent = `Layout (${count} vakken)`;
        buildAdminModal();
      } else if (adminMode && isBunker) {
        document.getElementById('modalTitle').textContent = `Layout (${count} vakken)`;
        buildAdminModal();
      } else if (isZak) {
        if (count === 1) document.getElementById('modalTitle').textContent = `Rij ${first.dataset.rij} – Zak ${first.dataset.layer}`;
        else { const ls = selectedCells.map(c => c.dataset.layer); document.getElementById('modalTitle').textContent = `Rij ${first.dataset.rij} – Zak ${Math.min(...ls)}–${Math.max(...ls)} (${count})`; }
        buildZakModal();

        document.getElementById('modalTitle').textContent = `Balen (${count})`;

    function closeModal() { document.getElementById('modal').classList.remove('active'); clearSelection(); }

    // ── Admin modal ──
    function buildAdminModal() {
      const g = document.getElementById('typeGrid'); g.innerHTML = '';

      // Verwijderen — bovenaan
      const rDel = document.createElement('div'); rDel.className = 'type-row'; rDel.style.marginBottom = '8px';

      eb.textContent = '🗑 Verwijderen';
      eb.addEventListener('click', () => { if (confirm('Geselecteerde vlakken verwijderen?')) removeFromLayout(); });
      rDel.appendChild(eb); g.appendChild(rDel);

      // Vaste elementen
      const r1 = document.createElement('div'); r1.className = 'type-row'; r1.style.flexWrap = 'wrap';

    function getLayout() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; } }

    function getQueue() { try { return JSON.parse(localStorage.getItem(QUEUE_KEY)) || []; } catch { return []; } }

    function loadZakDataToGrid() {

      Object.entries(zd).forEach(([key, val]) => {
        const [rij, layer] = key.split('-');
        const el = document.querySelector(`.gc[data-rij="${rij}"][data-layer="${layer}"]`);

    async function syncLayoutToServer() { if (!navigator.onLine) return; try { const cells = Object.entries(layout).map(([k, v]) => { const [col, row] = k.split(',').map(Number); return { col, row, cell_type: v.cellType, label: v.label, meta: v.meta, updated_at: Date.now() }; }); await fetch('/api/layout/sync', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ cells }) }); } catch (e) {} }

    async function saveLayoutNow() {
      saveLayout();
      if (navigator.onLine) {
        document.getElementById('saveBtn').textContent = '⏳ Opslaan...';
        document.getElementById('saveBtn').disabled = true;
        try {
          await syncLayoutToServer();
          showToast('Layout opgeslagen naar server');
        } catch (e) {
          showToast('Lokaal opgeslagen — server sync mislukt');
        }
        document.getElementById('saveBtn').textContent = '💾 Opslaan';
        document.getElementById('saveBtn').disabled = false;
      } else {
        showToast('Lokaal opgeslagen (offline)');
      }
    }
    async function pullLayoutFromServer() {
      if (!navigator.onLine) return;
      try {
        const res = await fetch('/api/layout');
        if (!res.ok) return;
        const rows = await res.json();
        if (rows.length > 0) {
          layout = {};
          rows.forEach(r => {
            layout[`${r.col},${r.row}`] = { cellType: r.cell_type, label: r.label || '', meta: r.meta || {} };
          });
          saveLayout();
          renderGrid();
          console.log('Layout loaded from server:', rows.length, 'cells');
        }
      } catch (e) { console.log('Pull layout failed:', e); }
    }
    async function trySync() {
      if (syncInProgress || !navigator.onLine) return;
      let q = getQueue();
      // Filter out invalid entries
      q = q.filter(c => c.row_num !== undefined && c.row_num !== null && !isNaN(c.layer) && c.layer !== undefined);
      saveQueue(q);
      if (!q.length) return;
      syncInProgress = true;
      try {
        const r = await fetch('/api/sync', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ changes: q }) });
        if (r.ok) { saveQueue([]); showToast(`${q.length} gesynchroniseerd`); }
        else { console.log('Sync failed:', r.status); }
      } catch (e) { console.log('Sync error:', e); }
      finally { syncInProgress = false; }
    }
    async function pullFromServer() { if (!navigator.onLine) return; try { const r = await fetch('/api/cells'); if (!r.ok) return; const rows = await r.json(); const zd = getZakData(); let u = false; rows.forEach(r => { const k = `${r.row_num}-${r.layer}`; const l = zd[k]; if (!l || r.updated_at > l.updated_at) { const css = cssFromType(r.type); zd[k] = { type: r.type, cssClass: css, updated_at: r.updated_at }; u = true; } }); if (u) { saveZakData(zd); loadZakDataToGrid(); } } catch (e) {} }

      if (localStorage.getItem('yard_layout_version') !== 'v3') {
        localStorage.removeItem(STORAGE_KEY);
        localStorage.setItem('yard_layout_version', 'v3');
      }
      const savedLayout = getLayout();
      if (Object.keys(savedLayout).length > 0) {
        layout = savedLayout;
        renderGrid();
      }

      // Step 2: try to get server data (overwrites if newer)
      if (navigator.onLine) {
        try {
          const res = await fetch('/api/layout');
          if (res.ok) {
            const rows = await res.json();
            if (rows.length > 0) {
              layout = {};
              rows.forEach(r => {
                layout[`${r.col},${r.row}`] = { cellType: r.cell_type, label: r.label || '', meta: r.meta || {} };
              });
              localStorage.setItem(STORAGE_KEY, JSON.stringify(layout));
              renderGrid();
              console.log('Layout from server:', rows.length, 'cells');
            }
          }
        } catch (e) { console.log('Server unreachable, using local data'); }
      }

      // Step 3: if still empty, use default
      if (Object.keys(layout).length === 0) {
        layout = getDefaultLayout();
        localStorage.setItem(STORAGE_KEY, JSON.stringify(layout));
        renderGrid();
      }

      pullFromServer().then(() => trySync());
      setInterval(trySync, SYNC_INTERVAL);
      window.addEventListener('online', () => { updateOnline(); pullFromServer().then(() => trySync()); });
      window.addEventListener('offline', updateOnline);
      const vp = document.getElementById('viewport');
      vp.addEventListener('mousedown', onMouseDown); window.addEventListener('mousemove', onMouseMove); window.addEventListener('mouseup', onMouseUp);
      vp.addEventListener('wheel', onWheel, { passive: false });
      vp.addEventListener('touchstart', onTouchStart, { passive: false }); vp.addEventListener('touchmove', onTouchMove, { passive: false }); vp.addEventListener('touchend', onTouchEnd);
    });
    document.getElementById('modal').addEventListener('click', e => { if (e.target.id === 'modal') closeModal(); });
    document.getElementById('loginModal').addEventListener('click', e => { if (e.target.id === 'loginModal') closeLogin(); });
  </script>
</body>
</html>
